<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Asset - Balance Card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#ffffff;
       font-family:"Inter",sans-serif;padding:60px}
  /* isolated balance card (enlarged ~1.7x from the deck) */
  .balance{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:30px;
           padding:46px 56px;box-shadow:0 18px 50px rgba(9,52,40,.10)}
  .balance .lbl{font-size:24px;letter-spacing:2px;text-transform:uppercase;color:#6B6B7B;font-weight:600}
  .balance .amt{font-size:108px;font-weight:800;color:#C0392B;margin:10px 0 6px;font-variant-numeric:tabular-nums;line-height:1}
  .balance .sub{font-size:26px;color:#6B6B7B}
  .note{position:fixed;top:12px;left:0;right:0;text-align:center;color:#bbb;font-size:13px}
</style></head>
<body>
<div class="note">Asset: negative-balance card. Use DevTools → "Capture node screenshot" on the card for a clean cut, or just screenshot it.</div>
<div class="balance">
  <div class="lbl">Business account - available</div>
  <div class="amt">-€4,820.00</div>
  <div class="sub">Meridian Bank · 31 May</div>
</div>
</body></html>
