<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>Thumbnail A - 5 Ways Out</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#222;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:"Inter",sans-serif}
  .tb{width:1280px;height:720px;display:flex;overflow:hidden;position:relative}
  .left{width:60%;background:#0B4132;position:relative;display:flex;flex-direction:column;justify-content:center;padding:70px 64px}
  .eyebrow{color:#EB7D41;font-weight:800;font-size:34px;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px}
  .big{color:#F6F6F4;font-weight:900;font-size:150px;line-height:0.9;letter-spacing:-3px}
  .big .n{color:#EB7D41}
  .sub{color:#F6F6F4;font-weight:800;font-size:64px;line-height:1;margin-top:6px;letter-spacing:-1px}
  .ring{position:absolute;right:36px;bottom:30px;font-size:120px;color:#EB7D41;opacity:.9;font-weight:900}
  .right{width:40%;position:relative}
  .right img{width:100%;height:100%;object-fit:cover;object-position:50% 18%}
  /* seam shadow */
  .right::before{content:"";position:absolute;left:0;top:0;bottom:0;width:80px;
    background:linear-gradient(90deg,rgba(11,65,50,.85),transparent);z-index:2}
  .note{position:fixed;top:10px;left:0;right:0;text-align:center;color:#bbb;font-size:13px}
</style></head>
<body>
<div class="note">Direction A - "5 WAYS OUT" (hope/solution). Screenshot the 1280×720 frame below.</div>
<div class="tb">
  <div class="left">
    <div class="eyebrow">The freelance trap</div>
    <div class="big"><span class="n">5</span> WAYS</div>
    <div class="sub">OUT</div>
    <div class="ring">↻</div>
  </div>
  <div class="right"><img src="https://kickstartweb.github.io/decks/about-portrait.jpg" alt=""></div>
</div>
</body></html>
